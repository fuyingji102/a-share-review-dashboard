<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>A股实时资金与主线雷达</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@500;600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b0f14;--panel:#141a22;--panel2:#171e28;--line:#222c3a;--text:#e6edf6;--muted:#8a94a6;
  --red:#ff4d57;--red-dim:#b83c46;--green:#1fc77e;--green-dim:#168b5a;--blue:#4f8cff;--purple:#818cf8;
  --gold:#ffc857;--amber:#c8943a;
  --font-sans:'Inter','Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif;
  --font-title:'IBM Plex Sans','Noto Sans SC',sans-serif;
  --font-mono:'JetBrains Mono','Roboto Mono','SF Mono',monospace;
  --shadow:0 12px 40px rgba(0,0,0,.28);--radius:13px;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:var(--font-sans);font-variant-numeric:tabular-nums;-webkit-font-smoothing:antialiased}
.wrap{max-width:1500px;margin:auto;padding:20px 22px 30px}
header{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid var(--line)}
.brand{display:flex;align-items:center;gap:12px}.logo{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--blue),var(--purple));display:grid;place-items:center;font-size:18px;font-weight:700;box-shadow:0 6px 20px rgba(79,140,255,.25)}.title h1{font-family:var(--font-title);font-size:18px;margin:0;font-weight:600;letter-spacing:.02em}.title p{margin:3px 0 0;color:var(--muted);font-size:11px}.status{font-size:11px;color:var(--muted);text-align:right;line-height:1.4}
.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:12px}
.card{background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:var(--radius);padding:15px;min-width:0;box-shadow:var(--shadow)}
.span3{grid-column:span 3}.span4{grid-column:span 4}.span5{grid-column:span 5}.span6{grid-column:span 6}.span7{grid-column:span 7}.span8{grid-column:span 8}.span12{grid-column:span 12}
.kicker{font-size:10px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;font-weight:500}
.metric{font-size:28px;font-weight:700;margin:6px 0 2px;font-family:var(--font-mono);letter-spacing:-.02em}.metric-lg{font-size:36px}
.sub{font-size:11px;color:var(--muted)}.up{color:var(--red)}.down{color:var(--green)}.flat{color:var(--muted)}
.badge{padding:2px 8px;border-radius:999px;background:#1b2437;font-size:10px;color:#a0b4cf;font-weight:500;display:inline-flex;align-items:center;gap:4px;white-space:nowrap}
.badge-warn{background:#2d2412;color:var(--gold)}.badge-blue{background:#17223a;color:var(--blue)}.badge-purple{background:#1e1935;color:var(--purple)}
.cardhead{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px}.cardhead h2{font-size:14px;margin:0;font-weight:600}.cardhead p{font-size:10px;color:var(--muted);margin:3px 0 0}

/* ---- Conclusion Cards ---- */
.conclusion-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.conclusion-card{background:#0e141f;border:1px solid var(--line);border-radius:11px;padding:12px;position:relative;overflow:hidden}
.conclusion-card .kicker{font-size:9px;margin-bottom:4px}
.conclusion-card .val{font-family:var(--font-mono);font-size:20px;font-weight:600;margin:2px 0}
.conclusion-card .sub{font-size:10px}
.conclusion-card .tag-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:7px}
.conclusion-card .tag{font-size:9px;padding:2px 6px;border-radius:999px;background:#1a253a;color:#b0c4dd}

/* ---- Decision cockpit ---- */
.executive{padding:0;overflow:hidden;border-color:#29364a}.executive-top{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--line);background:#101722}.executive-top h2{font:600 16px var(--font-title);margin:0}.asof{font:500 10px var(--font-mono);color:var(--muted)}
.decision-grid{display:grid;grid-template-columns:1.05fr 1.7fr 1.05fr .8fr 1.4fr}.decision-cell{padding:15px 16px;min-height:128px;border-right:1px solid var(--line)}.decision-cell:last-child{border-right:0}.decision-label{font-size:9px;color:var(--muted);letter-spacing:.13em;text-transform:uppercase}.decision-value{font:600 22px var(--font-title);margin:7px 0 4px}.decision-note{color:var(--muted);font-size:10px;line-height:1.6}.regime-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;box-shadow:0 0 12px currentColor}.regime-trend{color:var(--red)}.regime-rotation{color:var(--gold)}.regime-divergence{color:#ff8b5c}.regime-panic{color:var(--green)}
.rotation-chain{display:flex;align-items:center;gap:6px;margin:8px 0;overflow:hidden}.rotation-pill{padding:5px 8px;border:1px solid var(--line);border-radius:6px;background:#111a27;font-size:11px;white-space:nowrap}.rotation-pill.in{border-color:rgba(255,77,87,.35);color:#ff7b83}.rotation-pill.out{border-color:rgba(31,199,126,.35);color:#55d99a}.rotation-chain i{color:#53647b;font-style:normal}.starline{color:var(--gold);font-size:14px;letter-spacing:1px}.focus-list{margin:7px 0 0;padding:0;list-style:none}.focus-list li{font-size:11px;padding:3px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.focus-list b{display:inline-grid;place-items:center;width:16px;height:16px;margin-right:6px;border-radius:4px;background:#1b2940;color:#82aefa;font:500 9px var(--font-mono)}

/* ---- Rotation Sankey ---- */
.sankey-wrap{display:grid;grid-template-columns:minmax(0,2fr) minmax(220px,.8fr);gap:14px}.sankey{height:260px;border:1px solid var(--line);border-radius:10px;background:#0c131d;overflow:hidden}.sankey svg{width:100%;height:100%}.sankey-side{display:flex;flex-direction:column;gap:8px}.radar-row{display:grid;grid-template-columns:84px 1fr 42px;gap:7px;align-items:center;font-size:10px}.radar-track{height:6px;background:#1a2534;border-radius:99px;overflow:hidden}.radar-track i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--blue),var(--purple))}.radar-row em{font:500 9px var(--font-mono);font-style:normal;text-align:right;color:var(--muted)}

/* ---- Persistence matrix ---- */
.persistence{overflow-x:auto}.p-row{display:grid;grid-template-columns:110px repeat(10,minmax(26px,1fr)) 62px;gap:4px;align-items:center;margin:5px 0;min-width:670px}.p-name{font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.p-day{height:24px;border-radius:5px;background:#111923;border:1px solid #182231;display:grid;place-items:center;font:500 8px var(--font-mono);color:#536176}.p-day.hot3{background:#492128;border-color:#743039;color:#ff949b}.p-day.hot2{background:#35272a;border-color:#5f383c;color:#e8a1a5}.p-day.hot1{background:#1d2d29;border-color:#285445;color:#65d8a6}.p-score{font:500 9px var(--font-mono);text-align:right;color:var(--muted)}

/* ---- Leader / playbook ---- */
.leader-board{width:100%;border-collapse:collapse;font-size:10px}.leader-board th{color:var(--muted);font-weight:500;text-align:left;padding:7px;border-bottom:1px solid var(--line)}.leader-board td{padding:8px 7px;border-bottom:1px solid #1a2431;vertical-align:middle}.leader-board details summary{cursor:pointer;color:#9db5d3}.leader-board details p{color:var(--muted);line-height:1.6;margin:7px 0 0}.risk-low{color:var(--green)}.risk-mid{color:var(--gold)}.risk-high{color:#ff7b83}
.playbook{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.scenario{border:1px solid var(--line);border-radius:10px;padding:12px;background:#0f151f}.scenario h3{font:600 12px var(--font-title);margin:0 0 8px}.scenario p{font-size:11px;line-height:1.6;margin:0}.scenario .trigger{margin-top:8px;color:var(--muted);font-size:9px}.scenario.bull{border-top:2px solid var(--red)}.scenario.neutral{border-top:2px solid var(--gold)}.scenario.bear{border-top:2px solid var(--green)}
.coverage-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.coverage-item{border:1px solid var(--line);border-radius:8px;padding:9px;background:#101720}.coverage-item b{font-size:10px}.coverage-item span{display:block;margin-top:4px;font-size:9px;color:var(--muted)}.coverage-state{float:right;color:var(--gold);font:500 8px var(--font-mono)}

/* ---- Intraday radar ---- */
.live-radar{border-color:#30405a;background:linear-gradient(160deg,#151e2b,#10161f)}.radar-title{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:12px}.radar-title h2{font:600 17px var(--font-title);margin:0}.radar-title p{margin:4px 0 0;color:var(--muted);font-size:10px}.live-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--red);box-shadow:0 0 12px var(--red);margin-right:6px;animation:pulse 1.6s infinite}@keyframes pulse{50%{opacity:.35}}
.six-radar{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}.radar-card{border:1px solid var(--line);border-radius:10px;background:#0d141e;padding:11px;min-height:96px}.radar-card.wide{grid-column:span 2;grid-row:span 2}.radar-card h3{font:600 11px var(--font-title);margin:0 0 7px}.radar-big{font:600 18px var(--font-title);margin:4px 0}.radar-meta{font-size:9px;color:var(--muted);line-height:1.55}
.live-bars{display:grid;grid-template-columns:1fr 1fr;gap:14px}.live-bar-title{font-size:9px;color:var(--muted);margin-bottom:6px}.sector-live-row{display:grid;grid-template-columns:82px 1fr 58px;gap:7px;align-items:center;padding:5px 4px;border-radius:6px;color:var(--text);text-decoration:none;font-size:10px}.sector-live-row:hover{background:#182232}.sector-live-row b{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.sector-live-track{height:10px;background:#192433;border-radius:3px;overflow:hidden}.sector-live-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#92313b,var(--red))}.sector-live-fill.out{background:linear-gradient(90deg,#176144,var(--green))}.sector-live-row em{font:500 9px var(--font-mono);font-style:normal;text-align:right}

/* ---- Sector terminal ---- */
.backlink{color:#91b6f6;text-decoration:none;font-size:10px}.sector-hero{display:grid;grid-template-columns:1.3fr repeat(4,1fr);gap:9px}.sector-name{font:600 25px var(--font-title);margin:5px 0}.state-badge{display:inline-flex;padding:4px 9px;border-radius:6px;background:#28311d;color:var(--gold);font-size:10px}.sector-stat{background:#0e151f;border:1px solid var(--line);border-radius:9px;padding:10px}.sector-stat b{display:block;font:600 17px var(--font-mono);margin-top:7px}.role-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.role-box{border:1px solid var(--line);border-radius:10px;background:#0d141e;padding:11px}.role-box h3{font:600 11px var(--font-title);margin:0 0 8px}.role-stock{display:grid;grid-template-columns:1fr auto;gap:3px;padding:7px 0;border-bottom:1px solid #192331;color:var(--text);text-decoration:none}.role-stock:last-child{border-bottom:0}.role-stock:hover b{color:#8eb4ff}.role-stock b{font-size:11px}.role-stock em{font:500 10px var(--font-mono);font-style:normal}.role-stock small{grid-column:1/-1;color:var(--muted);font-size:8px}.memory-list{display:flex;flex-direction:column;gap:7px}.memory-item{padding:9px;border-left:2px solid var(--blue);background:#101823;font-size:10px;line-height:1.6}.stock-quote{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}.stock-quote .sector-stat{min-height:82px}.pending-box{border:1px dashed #334154;border-radius:9px;padding:14px;color:var(--muted);font-size:10px;text-align:center}

/* ---- Flow Path ---- */
.flow-path{display:flex;align-items:center;gap:2px;overflow-x:auto;padding:10px 0 6px}
.flow-node{background:#111b2b;border:1px solid var(--line);border-radius:8px;padding:6px 11px;white-space:nowrap;font-size:11px;font-weight:500;min-width:60px;text-align:center;flex-shrink:0}
.flow-node .dir{display:block;font-size:9px;color:var(--muted);font-weight:400;margin-top:2px}
.flow-node.in{border-color:rgba(246,88,107,.3)}.flow-node.out{border-color:rgba(46,196,160,.3)}
.flow-arrow{color:var(--muted);font-size:12px;flex-shrink:0;padding:0 2px}

/* ---- Strength Table ---- */
.strength-table{width:100%;border-collapse:collapse;font-size:11px}
.strength-table th{text-align:left;color:var(--muted);font-weight:500;padding:6px 5px;border-bottom:1px solid var(--line)}
.strength-table td{padding:7px 5px;border-bottom:1px solid #172231}.strength-table tr:last-child td{border:0}
.s-bar{height:4px;background:#1a2538;border-radius:3px;overflow:hidden;margin-top:3px}.s-bar i{display:block;height:100%;border-radius:3px}
.s-label{font-size:9px;padding:1px 6px;border-radius:999px;font-weight:500;white-space:nowrap}
.s-label.strong{background:#1e2a1e;color:#4edaab}.s-label.switch{background:#1e1e2a;color:#a5b4fc}.s-label.spread{background:#1a2528;color:#67e8f9}.s-label.risk{background:#2a1e1e;color:#f87171}

/* ---- Heatmap ---- */
.heatmap{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-top:8px}.h-cell{border-radius:6px;padding:6px 5px;text-align:center;font-size:9px;min-height:38px;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:2px}.h-cell .sname{font-weight:500;font-size:9px;line-height:1.2}.h-cell .sval{font-family:var(--font-mono);font-size:8px}

/* ---- Stock Watch ---- */
.stock-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.stock-card{border:1px solid var(--line);border-radius:10px;padding:10px;background:#0c121e}
.stock-card .name{font-weight:600;font-size:13px}.stock-card .code{color:var(--muted);font-size:9px}
.stock-card .price-row{display:flex;align-items:baseline;justify-content:space-between;margin:6px 0 4px}
.stock-card .price-row b{font-family:var(--font-mono);font-size:15px}
.stock-card .tags{margin-top:5px;display:flex;flex-wrap:wrap;gap:3px}
.stock-card .tag{font-size:8px;padding:2px 5px;border-radius:999px;background:#172131;color:#8fa7c5;white-space:nowrap}
.stock-card .tag.hot{background:#261a23;color:#f5989e}.stock-card .tag.new-high{background:#1a262a;color:#61d9b3}.stock-card .tag.breakout{background:#1e1e2e;color:#a5b4fc}.stock-card .tag.volume{background:#262218;color:#eab76a}.stock-card .tag.inst{background:#1a202f;color:#7aa3f5}.stock-card svg{width:100%;height:28px;margin-top:4px}

/* ---- Mini Trend ---- */
.mini-chart{height:40px;margin:6px 0 0}.mini-chart svg{width:100%;height:100%}

/* ---- Notice Collapse ---- */
.notice-wrap{border:1px solid #2d2516;background:#121006;border-radius:10px;margin-bottom:12px;overflow:hidden}
.notice-toggle{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;cursor:pointer;font-size:11px;color:var(--amber);user-select:none}
.notice-toggle:hover{background:#1a170b}.notice-toggle .icon{font-size:12px;transition:transform .2s}.notice-toggle.open .icon{transform:rotate(180deg)}
.notice-body{padding:0 12px 8px;font-size:10px;color:#c8b98a;line-height:1.6;display:none}.notice-body.open{display:block}

/* ---- Table (legacy) ---- */
.table{width:100%;border-collapse:collapse;font-size:11px}.table th{text-align:left;color:var(--muted);font-weight:500;padding:6px 5px;border-bottom:1px solid var(--line)}.table td{padding:7px 5px;border-bottom:1px solid #172231}.table tr:last-child td{border:0}.table .num{text-align:right}.rank{color:var(--muted);width:22px}
.bar{height:4px;background:#1a2538;border-radius:3px;overflow:hidden;margin-top:3px}.bar i{display:block;height:100%;border-radius:3px;background:linear-gradient(90deg,var(--red),var(--red-dim))}

/* ---- Gauge ---- */
.thermo{display:flex;align-items:center;gap:12px}.gauge{width:72px;height:72px;border-radius:50%;display:grid;place-items:center;background:conic-gradient(var(--blue) calc(var(--score)*1%),#1a2838 0);position:relative;flex-shrink:0}.gauge:after{content:"";position:absolute;inset:6px;background:var(--panel);border-radius:50%}.gauge b{z-index:1;font-size:18px;font-family:var(--font-mono)}

/* ---- Ladder ---- */
.ladder{display:flex;align-items:flex-end;gap:4px;height:80px;padding-top:8px}.ladder .col{flex:1;min-width:3px;background:linear-gradient(180deg,var(--red),#4a2530);border-radius:3px 3px 0 0;position:relative}

/* ---- Flow Charts ---- */
.flowtabs{display:flex;gap:6px}.flowtab{flex:1;border:1px solid #243144;background:#121b29;color:#94a8c0;border-radius:8px;padding:7px;cursor:pointer;font-size:11px;text-align:center}.flowtab.active{border-color:var(--blue);background:#172a40;color:#d0e0f5}.flowchart{height:340px;border:1px solid var(--line);border-radius:10px;background:#0c1420;padding:6px;margin-top:10px}.flowchart svg{width:100%;height:100%}.flowtooltip{position:absolute;z-index:5;display:none;min-width:140px;max-width:240px;padding:8px 10px;border:1px solid #2f4460;border-radius:7px;background:rgba(4,10,18,.95);font-size:10px;line-height:1.5;color:#d4e1f0;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,.35)}.flowhint{color:var(--muted);font-size:9px;margin-top:5px}

/* ---- Timeline ---- */
.timeline{display:flex;overflow-x:auto;gap:8px;padding-bottom:4px}.day{min-width:160px;border-left:2px solid #28344a;padding:4px 0 4px 10px}.day.current{border-color:var(--blue)}.day time{font-size:10px;color:var(--muted)}.chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}.chip{font-size:9px;padding:3px 6px;border-radius:999px;background:#16212f;color:#a0b8d0}.chip.concept{background:#241b28;color:#e8a0b0}

/* ---- Responsive ---- */
@media(max-width:1050px){.span3,.span4{grid-column:span 6}.span5,.span7,.span8{grid-column:span 12}.stock-grid,.conclusion-grid{grid-template-columns:repeat(2,1fr)}.decision-grid{grid-template-columns:repeat(2,1fr)}.decision-cell{border-bottom:1px solid var(--line)}.decision-cell:nth-child(even){border-right:0}.decision-cell:last-child{grid-column:span 2}.sankey-wrap{grid-template-columns:1fr}.coverage-grid{grid-template-columns:repeat(2,1fr)}.sector-hero{grid-template-columns:repeat(2,1fr)}.sector-hero>div:first-child{grid-column:span 2}.role-grid{grid-template-columns:repeat(2,1fr)}.stock-quote{grid-template-columns:repeat(3,1fr)}}
@media(max-width:650px){.wrap{padding:12px}.span3,.span4,.span5,.span6,.span7,.span8{grid-column:span 12}.conclusion-grid,.stock-grid{grid-template-columns:1fr 1fr}.metric{font-size:24px}.heatmap{grid-template-columns:repeat(3,1fr)}.decision-grid,.six-radar{grid-template-columns:1fr}.decision-cell,.decision-cell:nth-child(even){border-right:0}.decision-cell:last-child{grid-column:auto}.radar-card.wide{grid-column:auto;grid-row:auto}.live-bars,.role-grid{grid-template-columns:1fr}.sankey{height:300px}.playbook,.coverage-grid{grid-template-columns:1fr}.sector-hero{grid-template-columns:1fr}.sector-hero>div:first-child{grid-column:auto}.stock-quote{grid-template-columns:repeat(2,1fr)}}
.empty{color:var(--muted);padding:24px;text-align:center;font-size:12px}.foot{color:var(--muted);font-size:10px;text-align:center;margin:20px 0 2px}
</style>
</head>
<body><div class="wrap">
<header>
  <div class="brand"><div class="logo">A</div><div class="title"><h1>A股实时资金与主线雷达</h1><p id="meta">Real-time Capital Rotation & Sector Leadership Terminal</p></div></div>
  <div class="status" id="status">就绪</div>
</header>

<!-- 折叠口径说明 -->
<div class="notice-wrap" id="noticeWrap">
  <div class="notice-toggle" onclick="document.getElementById('noticeBody').classList.toggle('open');this.classList.toggle('open')">
    <span>ⓘ 数据口径说明</span><span class="icon">▼</span>
  </div>
  <div class="notice-body" id="noticeBody">行业/概念榜当前是"指数涨幅 + 成交额"的强度代理，并非资金净流入。龙虎榜机构与游资净买额为真实接口字段。本工具用于盘后研究，不构成任何投资建议。</div>
</div>

<main class="grid" id="app"><div class="card span12 empty">正在加载数据...</div></main>
<div class="foot">数据源：同花顺扶摇 · 东方财富 · 实时监控仅供研究，不构成投资建议</div>
</div>
<script>
const $=s=>document.querySelector(s), $$=s=>document.querySelectorAll(s);
const fmt=n=>n==null?'—':(Math.abs(n)>=1e12?(n/1e12).toFixed(2)+'万亿':Math.abs(n)>=1e8?(n/1e8).toFixed(2)+'亿':(n/1e4).toFixed(1)+'万');
const pct=n=>n==null?'—':`${n>=0?'+':''}${Number(n).toFixed(2)}%`;
const cls=n=>n>0?'up':n<0?'down':'flat';
const safe=a=>Array.isArray(a)?a:[];
const esc=s=>String(s??'—').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));

/* ── Sparklines ── */
function sparkLine(vals,color,height=28){const a=vals.filter(v=>Number.isFinite(Number(v))).map(Number);if(a.length<2)return '';const lo=Math.min(...a),hi=Math.max(...a),span=hi-lo||1,w=100,h=height;return `<svg viewBox="0 0 ${w} ${h}"><path d="${a.map((v,i)=>`${i?'L':'M'}${i/(a.length-1)*w}${h-(v-lo)/span*(h-4)}`).join(' ')}" stroke="${color}" stroke-width="1.5" fill="none"/></svg>`}

/* ── Heatmap color ── */
function heatColor(v){if(v==null)return'#131b28';const t=Math.max(-5,Math.min(5,v));const r=t>0?Math.round(200*t/5):0,g=t<0?Math.round(200*Math.abs(t)/5):0;return`rgb(${r+30},${g+30},${50+Math.abs(t)*8})`}

/* ── Stream graph placeholder ── */
function streamSvg(labels,values,height=80){const max=Math.max(...values,1),w=labels.length*30;return`<svg viewBox="0 0 ${w} ${height}">${labels.map((l,i)=>{const v=values[i]/max,h=Math.max(3,v*60);const x=i*30+2;return`<rect x="${x}" y="${height-h-10}" width="24" height="${h}" rx="2" fill="${values[i]>=0?'rgba(246,88,107,.6)':'rgba(46,196,160,.6)'}"/><text x="${x+12}" y="${height-1}" font-size="7" fill="#7487a0" text-anchor="middle">${l}</text>`}).join('')}</svg>`}

/* ── Stock tag classification ── */
function classifyTags(stock,leaders,orgTop){const tags=[];const name=stock.name||'';const tags_raw=stock.tags||[];const cp=Number(stock.change_pct)||0;const trend=(stock.trend||[]).filter(t=>t.price!=null);if(name.includes('机器人')||name.includes('宇树')||tags_raw.some(t=>(typeof t==='string'?t:t.name||'').includes('机器人')))tags.push({label:'机器人',cls:'hot'});if(cp>9.5)tags.push({label:'涨停',cls:'hot'});if(cp>5)tags.push({label:'异动',cls:'breakout'});if(orgTop.slice(0,3).some(o=>o.name===name||o.thscode===stock.thscode))tags.push({label:'机构',cls:'inst'});const prices=trend.map(t=>Number(t.price)).filter(Number.isFinite);if(prices.length>=2&&prices[prices.length-1]===Math.max(...prices))tags.push({label:'新高',cls:'new-high'});const dailyTags=tags_raw.map(t=>typeof t==='string'?t:t.name||'').filter(Boolean);dailyTags.slice(0,2).forEach(t=>{if(!tags.some(tg=>tg.label===t))tags.push({label:t,cls:''})});return tags.slice(0,4)}

/* ── Composite sector strength ── */
function calcSectorStrength(rows,rotation){return safe(rows).map(r=>{const pct=Number(r.change_pct)||0;const to=Number(r.turnover)||0;const maxTo=Math.max(...safe(rows).map(x=>Number(x.turnover)||1),1);const toRatio=to/maxTo;const recentDays=rotation.slice(-5);let hits=0;recentDays.forEach((d,i)=>{if((d.industries||[]).includes(r.name)||(d.concepts||[]).includes(r.name))hits+=(i+1)/Math.max(1,recentDays.length)});const persistence=Math.min(1,hits/Math.max(1,recentDays.length*.6));const priceScore=Math.max(0,Math.min(45,(pct+1)*5));const score=Math.max(0,Math.min(100,priceScore+toRatio*20+persistence*25+(pct>0?10:0)));let cat='spread',catLabel='补涨扩散',catCls='spread';if(score>=68&&pct>2){cat='strong';catLabel='主线加强';catCls='strong'}else if(score>=52&&pct>0){cat='switch';catLabel='高低切';catCls='switch'}else if(pct<-3){cat='risk';catLabel='退潮风险';catCls='risk'}return{...r,score:Math.round(score*10)/10,pct,pctLabel:pct>0?'涨':'跌',cat,catLabel,catCls}}).sort((a,b)=>b.score-a.score)}

/* ── Decision engine: every conclusion keeps its evidence visible ── */
function computeRegime(m,s,f){const breadth=Number(m.up_count||0)/Math.max(1,Number(m.up_count||0)+Number(m.down_count||0));const temp=Number(m.temperature||0);const main=Number(f?.market_latest?.main??0);const vol=Number(m.turnover_change_pct||0);let key='rotation',name='Rotation Day',cn='轮动日',note='热点快速切换，追高胜率下降';if(temp<=30||breadth<.28){key='panic';name='Panic',cn='恐慌',note='广度与情绪同步收缩，优先控制风险'}else if(temp<42||breadth<.4){key='panic';name='Risk Off',cn='风险规避',note='弱势结构，等待止跌与增量确认'}else if(temp>=62&&breadth>=.58&&main>0){key='trend';name='Trend Day',cn='趋势日',note='广度与主力资金同向，主线具备延续条件'}else if((temp>=60&&main<0)||(breadth>.6&&main<0)){key='divergence';name='Divergence',cn='背离',note='个股活跃但主力净流出，警惕冲高分歧'}else if(Math.abs(vol)<6){note='存量资金轮动，重视强弱切换而非指数方向'}return{key,name,cn,note,breadth,temp,main,vol}}
function starText(score){const n=Math.max(1,Math.min(5,Math.round(Number(score||0)/20)));return'★'.repeat(n)+'☆'.repeat(5-n)}
function buildLeaderRows(stocks,orgTop){return safe(stocks).map((r,i)=>{const cp=Number(r.change_pct||0),trend=safe(r.trend).map(x=>Number(x.price)).filter(Number.isFinite);const atHigh=trend.length>=5&&cp>0&&trend[trend.length-1]>=Math.max(...trend);const org=safe(orgTop).some(x=>x.thscode===r.thscode||x.name===r.name);const rank=Math.max(0,10-Number(r.rank||10));const score=Math.max(12,Math.min(100,38+Math.min(25,Math.max(-10,cp)*2.5)+rank*2+(atHigh?12:0)+(org?15:0)));const reasons=[];if(atHigh)reasons.push('阶段新高');if(cp>5)reasons.push('强势异动');if(org)reasons.push('机构净买');if(Number(r.rank||99)<=5)reasons.push('热度前五');if(!reasons.length)reasons.push('热股候选');const move=Math.abs(cp);const risk=move>=9.5?'高':move>=5?'中':'低';return{...r,score:Math.round(score),stars:starText(score),reasons,risk,riskCls:risk==='高'?'risk-high':risk==='中'?'risk-mid':'risk-low'}}).sort((a,b)=>b.score-a.score)}
function persistenceData(rotation){const days=safe(rotation).slice(-10);const map={};days.forEach((d,di)=>{[['industries',safe(d.industries)],['concepts',safe(d.concepts)]].forEach(([,names])=>names.forEach((name,rank)=>{if(!map[name])map[name]=Array(days.length).fill(0);map[name][di]=Math.max(map[name][di],3-rank)}))});return{days,rows:Object.entries(map).map(([name,vals])=>({name,vals,score:vals.reduce((a,b)=>a+b,0),hits:vals.filter(Boolean).length})).sort((a,b)=>b.score-a.score).slice(0,10)}}
function persistenceHtml(rotation){const p=persistenceData(rotation);if(!p.days.length)return'<div class="empty">从首次盘后快照开始积累</div>';const blanks=Array(10-p.days.length).fill(null);const labels=[...blanks,...p.days];return`<div class="persistence"><div class="p-row"><span class="p-name">板块 / 主题</span>${labels.map(d=>`<span class="p-day">${d?esc(String(d.date).slice(5)):'—'}</span>`).join('')}<span class="p-score">持续度</span></div>${p.rows.map(r=>{const vals=[...blanks.map(()=>0),...r.vals];return`<div class="p-row"><b class="p-name">${esc(r.name)}</b>${vals.map(v=>`<span class="p-day ${v?'hot'+v:''}">${v?'●':''}</span>`).join('')}<span class="p-score">${r.hits}/${p.days.length}日</span></div>`}).join('')}</div><div class="flowhint">颜色表示进入当日前三的名次；当前仅积累 ${p.days.length} 个交易日，满 10 日后判断更稳定。</div>`}
function sankeyHtml(flow){const outs=safe(flow?.sector_out).slice(0,4),ins=safe(flow?.sector_in).slice(0,4);if(!outs.length&&!ins.length)return'<div class="empty">暂无板块资金数据</div>';const all=[...outs,...ins],max=Math.max(...all.map(x=>Math.abs(Number(x.value||0))),1);const node=(r,x,y,type)=>`<g><rect x="${x}" y="${y}" width="150" height="34" rx="7" fill="${type==='out'?'#10271f':'#2b171d'}" stroke="${type==='out'?'#245d47':'#65303a'}"/><text x="${x+10}" y="${y+14}" fill="#e6edf6" font-size="10">${esc(r.name)}</text><text x="${x+10}" y="${y+27}" fill="${type==='out'?'#55d99a':'#ff7b83'}" font-size="9">${Math.abs(Number(r.value)).toFixed(1)}亿</text></g>`;const curves=[];outs.forEach((r,i)=>{const y=22+i*55+17,w=3+Math.abs(Number(r.value))/max*17;curves.push(`<path d="M170 ${y} C270 ${y},270 130,390 130" fill="none" stroke="#1fc77e" stroke-opacity=".35" stroke-width="${w}"/>`)});ins.forEach((r,i)=>{const y=22+i*55+17,w=3+Math.abs(Number(r.value))/max*17;curves.push(`<path d="M510 130 C630 130,630 ${y},730 ${y}" fill="none" stroke="#ff4d57" stroke-opacity=".42" stroke-width="${w}"/>`)});return`<svg viewBox="0 0 900 260" preserveAspectRatio="xMidYMid meet">${curves.join('')}<rect x="390" y="98" width="120" height="64" rx="12" fill="#172238" stroke="#365176"/><text x="450" y="125" fill="#9dbdf2" font-size="11" text-anchor="middle">CAPITAL</text><text x="450" y="145" fill="#647b98" font-size="9" text-anchor="middle">轮动资金池</text>${outs.map((r,i)=>node(r,20,22+i*55,'out')).join('')}${ins.map((r,i)=>node(r,730,22+i*55,'in')).join('')}</svg>`}
function radarHtml(rows){const top=safe(rows).slice(0,6),max=Math.max(...top.map(x=>Number(x.score||0)),1);return top.map(r=>`<div class="radar-row"><span>${esc(r.name)}</span><div class="radar-track"><i style="width:${Math.max(4,Number(r.score||0)/max*100)}%"></i></div><em>${Number(r.score||0).toFixed(1)}</em></div>`).join('')||'<div class="empty">暂无</div>'}
function volumeProfile(row,history){const vals=safe(history).map(d=>safe(d.industry_top).find(x=>x.name===row?.name)?.turnover).filter(Number.isFinite).map(Number);const avg=vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:null;const current=Number(row?.turnover||0);return{current,avg,ratio:avg?((current/avg)-1)*100:null,samples:vals.length}}

function stockHref(row,sector){return`/stock/${encodeURIComponent(row.code)}?sector=${encodeURIComponent(sector.code)}&sectorName=${encodeURIComponent(sector.name)}&name=${encodeURIComponent(row.name||row.code)}`}

function liveBarsHtml(rows,type){const list=safe(rows).slice(0,6),max=Math.max(...list.map(x=>Math.abs(Number(x.value||0))),1);if(!list.length)return'<div class="empty">等待实时数据</div>';return list.map(r=>`<a class="sector-live-row" href="${sectorHref(r)}" target="_blank" rel="noopener"><b>${esc(r.name)}</b><span class="sector-live-track"><i class="sector-live-fill ${type==='out'?'out':''}" style="display:block;width:${Math.max(4,Math.abs(Number(r.value||0))/max*100)}%"></i></span><em class="${type==='out'?'down':'up'}">${type==='out'?'-':'+'}${Math.abs(Number(r.value||0)).toFixed(1)}亿</em></a>`).join('')}

function realtimeOverviewHtml(d,m,s,industryStrength){const f=d.fund_flow||{},ins=safe(f.sector_in),outs=safe(f.sector_out),ts=flowTimestamp(f),top=ins[0]||{},maxIn=Math.max(...ins.map(x=>Math.abs(Number(x.value||0))),1),main=Number(f.market_latest?.main||0);return`<section class="card span12 live-radar"><div class="radar-title"><div><h2><span class="live-dot"></span>盘中实时交易雷达</h2><p>资金正在切向哪里，点击板块查看内部角色与还能关注的标的</p></div><span class="asof">${esc(ts||'等待实时接口')}</span></div><div class="six-radar">

function flowDelta(points,minutes){const p=safe(points),last=p[p.length-1];if(!last)return null;const prev=p[Math.max(0,p.length-1-minutes)];return Number(last.value||0)-Number(prev?.value||0)}
function sectorState(payload){const latest=Number(payload.flow?.[payload.flow.length-1]?.value||0),d5=flowDelta(payload.flow,5)||0,d30=flowDelta(payload.flow,30)||0;if(latest>0&&d5>0&&d30>0)return'主升';if(latest>0&&d5<0)return'分歧';if(latest<0&&d5>0)return'修复';if(latest>0&&d30<0)return'回流';return'退潮'}
function stockTags(r,role){const tags=[role];if(Number(r.change_pct)>=9.5)tags.push('涨停');if(Number(r.volume_ratio)>=1.5)tags.push('放量');if(Number(r.turnover_rate)>=8)tags.push('高换手');if(String(r.code).startsWith('300')||String(r.code).startsWith('688'))tags.push('20cm');if(Number(r.main_net)>0)tags.push('主力净流入');return tags.slice(0,5)}
function classifySectorStocks(rows){const all=safe(rows).filter(x=>Number(x.price)>0),used=new Set();const take=(arr,n=4)=>{const out=[];for(const x of arr){if(!used.has(x.code)){used.add(x.code);out.push(x)}if(out.length>=n)break}return out};const byFlow=[...all].sort((a,b)=>Number(b.main_net)-Number(a.main_net)),byTurn=[...all].sort((a,b)=>Number(b.turnover)-Number(a.turnover)),byRise=[...all].sort((a,b)=>Number(b.change_pct)-Number(a.change_pct)),byCap=[...all].sort((a,b)=>Number(b.market_cap)-Number(a.market_cap));return[
{key:'Leader',title:'A. 龙头 Leader',rows:take(byFlow.filter(x=>x.main_net>0&&x.change_pct>0))},
{key:'Core',title:'B. 中军 Core',rows:take(byTurn.filter(x=>x.change_pct>-2))},
{key:'High Beta',title:'C. 弹性 High Beta',rows:take(byRise.filter(x=>x.change_pct>3))},
{key:'Catch-up',title:'D. 补涨 Catch-up',rows:take(byRise.filter(x=>x.change_pct>0&&x.change_pct<5&&x.volume_ratio>1))},
{key:'Trend',title:'E. 机构趋势 Trend',rows:take(byCap.filter(x=>x.change_pct>0))},
{key:'Risk',title:'G. 风险 Risk',rows:take([...all].sort((a,b)=>Number(a.change_pct)-Number(b.change_pct)).filter(x=>x.change_pct<0))},
]}
function rememberSector(payload,state){try{const key=`radar-memory:${payload.code}`,old=JSON.parse(localStorage.getItem(key)||'[]'),entry={time:payload.updated_at,state,flow:Number(payload.flow?.[payload.flow.length-1]?.value||0)};const next=[...old.filter(x=>x.time!==entry.time),entry].slice(-20);localStorage.setItem(key,JSON.stringify(next));return next}catch{return[]}}

/* ── Flow SVG ── */
const flowColors=['#78fff2','#818cf8','#39e6a3','#f59e0b','#ec4899','#5b9aff','#eab308','#ef4444'];
function formatFlowTime(v){return(String(v||'')).slice(-5)}
function flowTimestamp(flow){const rows=safe(flow?.market_rows),latest=flow?.market_latest||rows[rows.length-1]||{};return String(latest.time||'')}
function sameTradingDay(a,b){return Boolean(a&&b&&String(a).slice(0,10)===String(b).slice(0,10))}
function flowSvg(series){const values=series.flatMap(s=>safe(s.points).map(p=>Number(p.value))).filter(Number.isFinite);if(!values.length)return'<div class="empty">暂无</div>';const W=900,H=320,L=50,R=100,T=14,B=38,lo=Math.min(...values,0),hi=Math.max(...values,0),span=hi-lo||1;const x=(i,n)=>L+i/Math.max(1,n-1)*(W-L-R),y=v=>T+(hi-v)/span*(H-T-B);const paths=series.map((s,si)=>{const pts=safe(s.points);if(!pts.length)return'';const d=pts.map((p,i)=>`${i?'L':'M'}${x(i,pts.length).toFixed(1)} ${y(Number(p.value)).toFixed(1)}`).join(' ');return`<path d="${d}" fill="none" stroke="${s.color||flowColors[si%flowColors.length]}" stroke-width="1.8"/>`}).join('');const t=(series.find(s=>safe(s.points).length)||{}).points||[];const ticks=[0,.25,.5,.75,1].map(r=>Math.round(r*Math.max(0,t.length-1))).filter((v,i,a)=>a.indexOf(v)===i);const xLabels=ticks.map(i=>`<text x="${x(i,t.length)}" y="${H-6}" fill="#60748c" font-size="9" text-anchor="middle">${formatFlowTime(t[i]?.time)}</text>`).join('');const labels=series.slice(0,12).map((s,i)=>`<text x="${W-R+6}" y="${15+i*17}" fill="${s.color||flowColors[i%flowColors.length]}" font-size="9">${esc(s.name)} ${safe(s.points).length?Number(s.points[s.points.length-1].value).toFixed(1):'—'}</text>`).join('');return`<svg viewBox="0 0 ${W} ${H}">${[0,.25,.5,.75,1].map(t=>{const v=hi-span*t,yy=y(v);return`<line x1="${L}" x2="${W-R}" y1="${yy}" y2="${yy}" stroke="#182434"/><text x="${L-5}" y="${yy+3}" fill="#60748c" font-size="8" text-anchor="end">${v.toFixed(1)}</text>`}).join('')}<line x1="${L}" x2="${W-R}" y1="${y(0)}" y2="${y(0)}" stroke="#394a60" stroke-width="1"/>${paths}${xLabels}${labels}</svg>`}

/* ═══════════════════════════════════════════════
   DATA LOADING
   ═══════════════════════════════════════════════ */
async function tryFetch(u){try{return await fetch(u,{cache:'no-store'}).then(r=>r.json())}catch(e){return null}}
async function fetchLiveFundFlow(){return tryFetch('/api/live/fund-flow')||tryFetch('/api/fund-flow')}
let livePollBusy=false;
async function updateLiveFlow(d){
  if(livePollBusy)return;
  livePollBusy=true;
  $('#status').textContent='正在更新实时资金…';
  const live=await fetchLiveFundFlow();
  if(live&&live.live!==false){
    d.fund_flow=live;
    const ts=flowTimestamp(live);
    $('#status').textContent=`资金实时 ${ts?ts.slice(5,16):'已更新'} · 主体 ${d.meta.market_date}`;
    render(d);
  }else{$('#status').textContent=`实时资金暂不可用 · 主体 ${d.meta.market_date}`}
  livePollBusy=false;
}
async function loadSectorPage(){
  const code=decodeURIComponent(location.pathname.split('/').filter(Boolean).pop()||'').toUpperCase();
  const params=new URLSearchParams(location.search),name=params.get('name')||code;
  $('#status').textContent='正在加载板块实时数据…';
  const [payload,snapshot]=await Promise.all([
    tryFetch(`/api/live/fund-flow?mode=sector&code=${encodeURIComponent(code)}&name=${encodeURIComponent(name)}`),
    tryFetch('/api/data').then(x=>x||tryFetch('/data/dashboard-data.json')),
  ]);
  if(!payload||payload.live===false||payload.error){$('#app').innerHTML=`<section class="card span12 empty"><h2>板块数据加载失败</h2><p>${esc(payload?.error||'实时接口暂不可用')}</p><a class="backlink" href="/">返回首页</a></section>`;$('#status').textContent='板块接口不可用';return}
  renderSectorTerminal(payload,snapshot||{});
  setInterval(async()=>{const next=await tryFetch(`/api/live/fund-flow?mode=sector&code=${encodeURIComponent(code)}&name=${encodeURIComponent(name)}`);if(next&&next.live!==false)renderSectorTerminal(next,snapshot||{})},30000);
}
async function loadStockPage(){
  const code=decodeURIComponent(location.pathname.split('/').filter(Boolean).pop()||''),params=new URLSearchParams(location.search),sectorCode=params.get('sector')||'',sectorName=params.get('sectorName')||sectorCode;
  $('#status').textContent='正在加载个股实时数据…';
  const payload=await tryFetch(`/api/live/fund-flow?mode=sector&code=${encodeURIComponent(sectorCode)}&name=${encodeURIComponent(sectorName)}`);
  const stock=safe(payload?.stocks).find(x=>String(x.code)===String(code));
  if(!payload||!stock){$('#app').innerHTML='<section class="card span12 empty"><h2>个股数据加载失败</h2><a class="backlink" href="/">返回首页</a></section>';$('#status').textContent='个股接口不可用';return}
  renderStockTerminal(stock,payload);
}
async function load(){
  let d=window.DASHBOARD_DATA||await tryFetch('/api/data')||await tryFetch('/data/dashboard-data.json');
  if(!d||d.empty){$('#status').textContent='无法加载数据';$('#app').innerHTML='<div class="card span12 empty"><h2 style="font-size:15px;margin:0 0 6px">无法加载数据</h2><p>请通过 HTTP 服务器访问此页面，或推送后通过 Netlify 访问。</p></div>';return}
  // First paint must never wait for the serverless live-flow proxy.
  d.snapshot_fund_flow=d.fund_flow;
  $('#status').textContent='盘后快照已加载';
  render(d);
  await updateLiveFlow(d);
  setInterval(()=>updateLiveFlow(d),30000);
}
if(location.pathname.startsWith('/sector/'))loadSectorPage();
else if(location.pathname.startsWith('/stock/'))loadStockPage();
else load();
</script></body></html>

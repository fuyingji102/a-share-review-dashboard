    .focus{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.focusbox{border:1px solid var(--line);border-radius:12px;padding:12px}.focusbox strong{font-size:12px}.focusbox ol{margin:9px 0 0;padding-left:20px;font-size:13px;line-height:1.8}.empty{color:var(--muted);padding:30px;text-align:center}.errors{font-size:11px;color:#dca7aa;margin-top:8px;display:none}.foot{color:#687b8f;font-size:11px;text-align:center;margin:18px 0 4px}

<body><div class="wrap">
  <header><div class="brand"><div class="logo">A</div><div class="title"><h1>A股资金与轮动 · 盘后复盘台</h1><p id="meta">等待首次数据采集</p></div></div><div class="actions"><div class="status" id="status">页面已就绪</div><button class="btn" id="refresh">刷新数据</button></div></header>

<script>
const $=s=>document.querySelector(s), fmtMoney=n=>n==null?'待接入':(Math.abs(n)>=1e12?(n/1e12).toFixed(2)+'万亿':Math.abs(n)>=1e8?(n/1e8).toFixed(2)+'亿':(n/1e4).toFixed(1)+'万'), pct=n=>n==null?'—':`${n>=0?'+':''}${Number(n).toFixed(2)}%`, cls=n=>n>0?'up':n<0?'down':'flat';
const safe=a=>Array.isArray(a)?a:[], esc=s=>String(s??'—').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
function table(rows,valueKey='change_pct',money=false){if(!rows.length)return '<div class="empty">暂无可用数据</div>';let max=Math.max(...rows.map(x=>Math.abs(Number(x[valueKey])||0)),1);return `<table class="table"><thead><tr><th>#</th><th>名称</th><th class="num">${money?'净买额':'涨跌幅'}</th></tr></thead><tbody>${rows.map((r,i)=>`<tr><td class="rank">${i+1}</td><td><b>${esc(r.name)}</b><div class="bar"><i style="width:${Math.abs(Number(r[valueKey])||0)/max*100}%"></i></div></td><td class="num ${cls(r[valueKey])}">${money?fmtMoney(r[valueKey]):pct(r[valueKey])}</td></tr>`).join('')}</tbody></table>`}
function spark(points,color){let vals=safe(points).map(x=>Number(x.price)).filter(Number.isFinite);if(vals.length<2)return `<svg viewBox="0 0 100 35"><path d="M0 25 L100 25" stroke="#29394b" fill="none"/></svg>`;let lo=Math.min(...vals),hi=Math.max(...vals),span=hi-lo||1,d=vals.map((v,i)=>`${i?'L':'M'} ${i/(vals.length-1)*100} ${31-(v-lo)/span*27}`).join(' ');return `<svg viewBox="0 0 100 35" preserveAspectRatio="none"><path d="${d}" stroke="${color}" stroke-width="2" fill="none"/></svg>`}
const flowColors=['#78fff2','#8b5cf6','#39e6a3','#f59e0b','#ec4899','#2563eb','#eab308','#ef4444','#06b6d4','#84cc16','#f97316','#0ea5e9','#d946ef','#22c55e','#fb7185','#a855f7'];
/*
function flowSvg(series){let values=series.flatMap(s=>safe(s.points).map(p=>Number(p.value))).filter(Number.isFinite);if(!values.length)return '<div class="empty">暂无资金曲线</div>';let W=900,H=360,L=58,R=100,T=18,B=35,lo=Math.min(...values,0),hi=Math.max(...values,0),span=hi-lo||1,x=(i,n)=>L+i/Math.max(1,n-1)*(W-L-R),y=v=>T+(hi-v)/span*(H-T-B);let grid=[0,.25,.5,.75,1].map(t=>{let v=hi-span*t,yy=y(v);return `<line x1="${L}" x2="${W-R}" y1="${yy}" y2="${yy}" stroke="#203044"/><text x="${L-8}" y="${yy+4}" fill="#71859a" font-size="10" text-anchor="end">${v.toFixed(1)}亿</text>`}).join('');let zero=`<line x1="${L}" x2="${W-R}" y1="${y(0)}" y2="${y(0)}" stroke="#9aabb8" stroke-width="1.3"/>`;let paths=series.map((s,si)=>{let pts=safe(s.points);if(!pts.length)return '';let d=pts.map((p,i)=>`${i?'L':'M'} ${x(i,pts.length).toFixed(1)} ${y(Number(p.value)).toFixed(1)}`).join(' '),last=pts[pts.length-1];return `<path d="${d}" fill="none" stroke="${s.color||flowColors[si%flowColors.length]}" stroke-width="2"/><circle cx="${x(pts.length-1,pts.length)}" cy="${y(Number(last.value))}" r="3" fill="${s.color||flowColors[si%flowColors.length]}"/>`}).join('');let labels=series.slice(0,16).map((s,i)=>`<text x="${W-R+8}" y="${18+i*18}" fill="${s.color||flowColors[i%flowColors.length]}" font-size="10">${esc(s.name)} ${safe(s.points).length?Number(s.points[s.points.length-1].value).toFixed(1):'—'}亿</text>`).join('');return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">${grid}${zero}${paths}${labels}</svg>`}
function renderFlowPanel(f){let box=$('#flowBody');if(!box)return;if(!f||f.error){box.innerHTML=`<div class="empty">资金流补充源暂不可用：${esc(f?.error||'暂无')}</div>`;return}let mode='market',chart='bar';const latest=f.market_latest||{};function draw(){document.querySelectorAll('.flowtab').forEach(b=>b.classList.toggle('active',b.dataset.mode===mode));$('#flowModes').style.display=mode==='sector'?'flex':'none';if(mode==='market'){let defs=[['main','主力','#78fff2'],['super','超大单','#ec4899'],['big','大单','#f59e0b'],['medium','中单','#39e6a3'],['small','小单','#8b5cf6']],series=defs.map(([key,name,color])=>({name,color,points:safe(f.market_rows).map(r=>({time:r.time,value:r[key]}))}));box.innerHTML=flowSvg(series);$('#flowLegend').innerHTML=series.map(s=>`<span><i style="background:${s.color}"></i>${s.name}</span>`).join('');$('#flowMetrics').innerHTML=`<div class="mini"><span class="sub">主力净额</span><b class="${cls(latest.main)}">${fmtMoney((latest.main||0)*1e8)}</b></div><div class="mini"><span class="sub">大单+超大单</span><b class="${cls((latest.big||0)+(latest.super||0))}">${fmtMoney(((latest.big||0)+(latest.super||0))*1e8)}</b></div><div class="mini"><span class="sub">中单+小单</span><b class="${cls((latest.medium||0)+(latest.small||0))}">${fmtMoney(((latest.medium||0)+(latest.small||0))*1e8)}</b></div>`}else if(chart==='line'){let entries=[...safe(f.sector_in),...safe(f.sector_out)],series=entries.map((r,i)=>({name:r.name,color:flowColors[i%flowColors.length],points:safe(f.sector_series?.[r.code])}));box.innerHTML=flowSvg(series);$('#flowLegend').innerHTML=series.map(s=>`<span><i style="background:${s.color}"></i>${esc(s.name)}</span>`).join('');let vin=safe(f.sector_in).reduce((a,r)=>a+Number(r.value||0),0),vout=safe(f.sector_out).reduce((a,r)=>a+Number(r.value||0),0);$('#flowMetrics').innerHTML=`<div class="mini"><span class="sub">Top8净流入</span><b class="up">${vin.toFixed(1)}亿</b></div><div class="mini"><span class="sub">Top8净流出</span><b class="down">${Math.abs(vout).toFixed(1)}亿</b></div><div class="mini"><span class="sub">整体</span><b class="${cls(vin+vout)}">${(vin+vout).toFixed(1)}亿</b></div>`}else{let groups=[['流入',safe(f.sector_in),'in'],['流出',safe(f.sector_out),'out']];box.innerHTML=groups.map(([title,rows,type])=>{let max=Math.max(...rows.map(r=>Math.abs(Number(r.value))),1);return `<div class="kicker" style="margin:10px 0;color:${type==='in'?'#ff7178':'#45dda7'}">${title}</div>${rows.map((r,i)=>`<div class="flowbar"><span>${i+1}</span><b>${esc(r.name)}</b><div class="flowbar-track"><div class="flowbar-fill ${type}" style="width:${Math.abs(Number(r.value))/max*100}%"></div></div><span class="value ${type==='in'?'up':'down'}">${Math.abs(Number(r.value)).toFixed(1)}亿</span></div>`).join('')}`).join('');$('#flowLegend').innerHTML='';let vin=safe(f.sector_in).reduce((a,r)=>a+Number(r.value||0),0),vout=safe(f.sector_out).reduce((a,r)=>a+Number(r.value||0),0);$('#flowMetrics').innerHTML=`<div class="mini"><span class="sub">Top8净流入</span><b class="up">${vin.toFixed(1)}亿</b></div><div class="mini"><span class="sub">Top8净流出</span><b class="down">${Math.abs(vout).toFixed(1)}亿</b></div><div class="mini"><span class="sub">整体</span><b class="${cls(vin+vout)}">${(vin+vout).toFixed(1)}亿</b></div>`}}document.querySelectorAll('.flowtab').forEach(b=>b.onclick=()=>{mode=b.dataset.mode;draw()});document.querySelectorAll('#flowModes button').forEach(b=>b.onclick=()=>{chart=b.dataset.chart;document.querySelectorAll('#flowModes button').forEach(x=>x.classList.toggle('active',x.dataset.chart===chart));draw()});draw()}

function flowSvg(series){let values=series.flatMap(s=>safe(s.points).map(p=>Number(p.value))).filter(Number.isFinite);if(!values.length)return '<div class="empty">暂无资金曲线</div>';let W=900,H=360,L=58,R=100,T=18,B=35,lo=Math.min(...values,0),hi=Math.max(...values,0),span=hi-lo||1,x=(i,n)=>L+i/Math.max(1,n-1)*(W-L-R),y=v=>T+(hi-v)/span*(H-T-B);let grid=[0,.25,.5,.75,1].map(t=>{let v=hi-span*t,yy=y(v);return `<line x1="${L}" x2="${W-R}" y1="${yy}" y2="${yy}" stroke="#203044"/><text x="${L-8}" y="${yy+4}" fill="#71859a" font-size="10" text-anchor="end">${v.toFixed(1)}亿</text>`}).join('');let zero=`<line x1="${L}" x2="${W-R}" y1="${y(0)}" y2="${y(0)}" stroke="#9aabb8" stroke-width="1.3"/>`;let paths=series.map((s,si)=>{let pts=safe(s.points);if(!pts.length)return '';let d=pts.map((p,i)=>`${i?'L':'M'} ${x(i,pts.length).toFixed(1)} ${y(Number(p.value)).toFixed(1)}`).join(' '),last=pts[pts.length-1];return `<path d="${d}" fill="none" stroke="${s.color||flowColors[si%flowColors.length]}" stroke-width="2"/><circle cx="${x(pts.length-1,pts.length)}" cy="${y(Number(last.value))}" r="3" fill="${s.color||flowColors[si%flowColors.length]}"/>`}).join('');let labels=series.slice(0,16).map((s,i)=>`<text x="${W-R+8}" y="${18+i*18}" fill="${s.color||flowColors[i%flowColors.length]}" font-size="10">${esc(s.name)} ${safe(s.points).length?Number(s.points[s.points.length-1].value).toFixed(1):'—'}亿</text>`).join('');return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">${grid}${zero}${paths}${labels}</svg>`}
function formatFlowTime(value){const text=String(value||'');return text.length>=5?text.slice(-5):text}
function flowSvgInteractive(series){
  const values=series.flatMap(s=>safe(s.points).map(p=>Number(p.value))).filter(Number.isFinite);
  if(!values.length)return '<div class="empty">暂无资金曲线</div>';
  const W=900,H=360,L=58,R=112,T=18,B=42,lo=Math.min(...values,0),hi=Math.max(...values,0),span=hi-lo||1;
  const x=(i,n)=>L+i/Math.max(1,n-1)*(W-L-R),y=v=>T+(hi-v)/span*(H-T-B);
  const grid=[0,.25,.5,.75,1].map(t=>{const v=hi-span*t,yy=y(v);return `<line x1="${L}" x2="${W-R}" y1="${yy}" y2="${yy}" stroke="#203044"/><text x="${L-8}" y="${yy+4}" fill="#71859a" font-size="10" text-anchor="end">${v.toFixed(1)}亿</text>`}).join('');
  const zero=`<line x1="${L}" x2="${W-R}" y1="${y(0)}" y2="${y(0)}" stroke="#9aabb8" stroke-width="1.3"/>`;
  const paths=series.map((s,si)=>{const pts=safe(s.points);if(!pts.length)return '';const d=pts.map((p,i)=>`${i?'L':'M'} ${x(i,pts.length).toFixed(1)} ${y(Number(p.value)).toFixed(1)}`).join(' '),last=pts[pts.length-1],color=s.color||flowColors[si%flowColors.length];return `<path d="${d}" fill="none" stroke="${color}" stroke-width="2"/><circle cx="${x(pts.length-1,pts.length)}" cy="${y(Number(last.value))}" r="3" fill="${color}"/>`}).join('');
  const labels=series.slice(0,16).map((s,i)=>`<text x="${W-R+8}" y="${18+i*18}" fill="${s.color||flowColors[i%flowColors.length]}" font-size="10">${esc(s.name)} ${safe(s.points).length?Number(s.points[s.points.length-1].value).toFixed(1):'—'}亿</text>`).join('');
  const timeline=(series.find(s=>safe(s.points).length)||{}).points||[];
  const ticks=[0,.25,.5,.75,1].map(r=>Math.round(r*Math.max(0,timeline.length-1))).filter((v,i,a)=>a.indexOf(v)===i);
  const xLabels=ticks.map(i=>`<text x="${x(i,timeline.length)}" y="${H-10}" fill="#71859a" font-size="10" text-anchor="middle">${formatFlowTime(timeline[i]?.time)}</text>`).join('');
  return `<svg class="interactive-flow-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" data-w="${W}" data-l="${L}" data-r="${R}">${grid}${zero}${paths}<line class="flow-cursor" x1="${L}" x2="${L}" y1="${T}" y2="${H-B}" stroke="#d8e5ef" stroke-width="1" stroke-dasharray="4 3" visibility="hidden"/>${xLabels}${labels}</svg><div class="flowhint">鼠标悬停或手指横向移动，查看对应分钟资金动向</div>`;
}
function bindFlowInteraction(container,series){
  const svg=container.querySelector('.interactive-flow-svg');
  const base=(series.find(s=>safe(s.points).length)||{}).points||[];
  if(!svg||!base.length)return;
  const tooltip=document.createElement('div');tooltip.className='flowtooltip';container.appendChild(tooltip);
  const cursor=svg.querySelector('.flow-cursor'),W=Number(svg.dataset.w),L=Number(svg.dataset.l),R=Number(svg.dataset.r);
  const hide=()=>{tooltip.style.display='none';cursor.setAttribute('visibility','hidden')};
  const move=clientX=>{
    const rect=svg.getBoundingClientRect();
    const ratio=Math.max(0,Math.min(1,((clientX-rect.left)/rect.width*W-L)/(W-L-R)));
    const baseIndex=Math.round(ratio*(base.length-1)),svgX=L+ratio*(W-L-R);
    cursor.setAttribute('x1',svgX);cursor.setAttribute('x2',svgX);cursor.setAttribute('visibility','visible');
    const rows=series.map((s,i)=>{const pts=safe(s.points),idx=Math.round(ratio*Math.max(0,pts.length-1)),value=pts[idx]?.value,color=s.color||flowColors[i%flowColors.length];return `<span><em style="color:${color};font-style:normal">${esc(s.name)}</em><b class="${cls(Number(value))}">${Number(value||0).toFixed(1)}亿</b></span>`}).join('');
    tooltip.innerHTML=`<strong>${formatFlowTime(base[baseIndex]?.time)}</strong>${rows}`;tooltip.style.display='block';
    const left=Math.max(8,Math.min(container.clientWidth-tooltip.offsetWidth-8,clientX-container.getBoundingClientRect().left+14));tooltip.style.left=`${left}px`;tooltip.style.top='16px';
  };
  svg.addEventListener('pointermove',e=>move(e.clientX));svg.addEventListener('pointerleave',hide);
  svg.addEventListener('touchmove',e=>{if(e.touches[0])move(e.touches[0].clientX)},{passive:true});svg.addEventListener('touchend',hide,{passive:true});
}
function renderFlowPanel(f){
  const box=$('#flowBody');
  if(!box)return;
  if(!f||f.error){box.innerHTML=`<div class="empty">资金流补充源暂不可用：${esc(f?.error||'暂无')}</div>`;return}
  let mode='market',chart='bar';
  const latest=f.market_latest||{};
  const totals=()=>{const vin=safe(f.sector_in).reduce((a,r)=>a+Number(r.value||0),0),vout=safe(f.sector_out).reduce((a,r)=>a+Number(r.value||0),0);return{vin,vout}};
  const setSectorMetrics=()=>{const{vin,vout}=totals();$('#flowMetrics').innerHTML=`<div class="mini"><span class="sub">Top8净流入</span><b class="up">${vin.toFixed(1)}亿</b></div><div class="mini"><span class="sub">Top8净流出</span><b class="down">${Math.abs(vout).toFixed(1)}亿</b></div><div class="mini"><span class="sub">整体</span><b class="${cls(vin+vout)}">${(vin+vout).toFixed(1)}亿</b></div>`};
  function draw(){
    document.querySelectorAll('.flowtab').forEach(b=>b.classList.toggle('active',b.dataset.mode===mode));
    $('#flowModes').style.display=mode==='sector'?'flex':'none';
    box.classList.toggle('bar-mode',mode==='sector'&&chart==='bar');
    if(mode==='market'){
      const defs=[['main','主力','#78fff2'],['super','超大单','#ec4899'],['big','大单','#f59e0b'],['medium','中单','#39e6a3'],['small','小单','#8b5cf6']];
      const series=defs.map(([key,name,color])=>({name,color,points:safe(f.market_rows).map(r=>({time:r.time,value:r[key]}))}));
      box.innerHTML=flowSvgInteractive(series);bindFlowInteraction(box,series);
      $('#flowLegend').innerHTML=series.map(s=>`<span><i style="background:${s.color}"></i>${s.name}</span>`).join('');
      $('#flowMetrics').innerHTML=`<div class="mini"><span class="sub">主力净额</span><b class="${cls(latest.main)}">${fmtMoney((latest.main||0)*1e8)}</b></div><div class="mini"><span class="sub">大单+超大单</span><b class="${cls((latest.big||0)+(latest.super||0))}">${fmtMoney(((latest.big||0)+(latest.super||0))*1e8)}</b></div><div class="mini"><span class="sub">中单+小单</span><b class="${cls((latest.medium||0)+(latest.small||0))}">${fmtMoney(((latest.medium||0)+(latest.small||0))*1e8)}</b></div>`;
    }else if(chart==='line'){
      const entries=[...safe(f.sector_in),...safe(f.sector_out)];
      const series=entries.map((r,i)=>({name:r.name,color:flowColors[i%flowColors.length],points:safe(f.sector_series?.[r.code])}));
      box.innerHTML=flowSvgInteractive(series);bindFlowInteraction(box,series);
      $('#flowLegend').innerHTML=series.map(s=>`<span><i style="background:${s.color}"></i>${esc(s.name)}</span>`).join('');
      setSectorMetrics();
    }else{
      const groups=[['流入',safe(f.sector_in),'in'],['流出',safe(f.sector_out),'out']];
      box.innerHTML=groups.map(([title,rows,type])=>{
        const max=Math.max(...rows.map(r=>Math.abs(Number(r.value))),1);
        const bars=rows.map((r,i)=>`<div class="flowbar"><span>${i+1}</span><b>${esc(r.name)}</b><div class="flowbar-track"><div class="flowbar-fill ${type}" style="width:${Math.abs(Number(r.value))/max*100}%"></div></div><span class="value ${type==='in'?'up':'down'}">${Math.abs(Number(r.value)).toFixed(1)}亿</span></div>`).join('');
        return `<div class="kicker" style="margin:10px 0;color:${type==='in'?'#ff7178':'#45dda7'}">${title}</div>${bars}`;
      }).join('');
      $('#flowLegend').innerHTML='';
      setSectorMetrics();
    }
  }
  document.querySelectorAll('.flowtab').forEach(b=>b.onclick=()=>{mode=b.dataset.mode;draw()});
  document.querySelectorAll('#flowModes button').forEach(b=>b.onclick=()=>{chart=b.dataset.chart;document.querySelectorAll('#flowModes button').forEach(x=>x.classList.toggle('active',x.dataset.chart===chart));draw()});
  draw();
}
function render(d){if(d.empty){$('#app').innerHTML='<div class="card span12 empty">尚未采集数据，请点击右上角“刷新数据”。</div>';return}if(d.meta&&!d.meta.has_data){$('#meta').textContent='最近一次采集失败';$('#app').innerHTML=`<div class="card span12"><div class="cardhead"><div><h2>数据源暂未连接成功</h2><p>不是没有行情，而是本轮所有上游请求均失败。</p></div><span class="badge warn">采集失败</span></div><div class="notice">${esc((d.meta.errors||[])[0]||'请重新刷新')}</div><div class="sub">请稍后重试；程序不会再用空结果覆盖已有的成功数据。</div></div>`;return}let m=d.market||{},s=d.sentiment||{},st=d.structure||{};$('#meta').textContent=`行情 ${d.meta.market_date||d.meta.trade_date} · 龙虎榜 ${d.meta.lhb_date||'最近交易日'} · 更新 ${new Date(d.meta.updated_at).toLocaleString('zh-CN')} · 样本 ${m.sample_count||0} 只`;
$('#app').innerHTML=`
<section class="card span3"><div class="kicker">两市成交额</div><div class="metric">${fmtMoney(m.turnover)}</div><div class="sub ${cls(m.turnover_change_pct)}">较上次 ${pct(m.turnover_change_pct)}</div></section>
<section class="card span3"><div class="kicker">市场温度</div><div class="thermo"><div class="gauge" style="--score:${m.temperature||0}"><b>${m.temperature||0}</b></div><div><b>${m.temperature>=65?'偏强':m.temperature<40?'偏弱':'均衡'}</b><div class="sub">成交额 · 广度 · 涨停</div></div></div></section>
<section class="card span3"><div class="kicker">主力资金净流入</div><div class="metric ${cls(d.money_flow.main_net)}">${fmtMoney(d.money_flow.main_net)}</div><div class="sub">${esc(d.money_flow.status)}</div></section>
<section class="card span3"><div class="kicker">龙虎榜机构净买</div><div class="metric ${cls(st.org_net)}">${fmtMoney(st.org_net)}</div><div class="sub">${esc(st.scope)}</div></section>

<section class="card span12"><div class="cardhead"><div><h2>实时资金流向</h2><p>东方财富分钟资金流 · 金额单位：亿元</p></div><div class="flowmode" id="flowModes" style="display:none"><button data-chart="line">折线</button><button class="active" data-chart="bar">柱状</button></div></div><div class="flowtabs"><button class="flowtab active" data-mode="market">大盘分单资金</button><button class="flowtab" data-mode="sector">板块资金</button></div><div class="flowchart" id="flowBody"></div><div class="flowlegend" id="flowLegend"></div><div class="flowmetrics" id="flowMetrics"></div></section>

<section class="card span6"><div class="cardhead"><div><h2>行业强度 Top 10</h2><p>${esc(d.money_flow.industry_basis)}</p></div><span class="badge warn">代理指标</span></div>${table(safe(d.industry_top))}</section>
<section class="card span6"><div class="cardhead"><div><h2>概念强度 Top 10</h2><p>${esc(d.money_flow.concept_basis)}</p></div><span class="badge warn">代理指标</span></div>${table(safe(d.concept_top))}</section>

<section class="card span5"><div class="cardhead"><div><h2>市场情绪</h2><p>涨跌停与连板高度</p></div><span class="badge">情绪周期</span></div><div class="breadth"><div class="mini"><span class="sub">涨停</span><b class="up">${s.limit_up_count??'—'}</b></div><div class="mini"><span class="sub">跌停</span><b class="down">${s.limit_down_count??'—'}</b></div><div class="mini"><span class="sub">最高连板</span><b>${s.max_board??'—'}</b></div></div><div class="breadth"><div class="mini"><span class="sub">红盘</span><b class="up">${m.up_count??'—'}</b></div><div class="mini"><span class="sub">绿盘</span><b class="down">${m.down_count??'—'}</b></div><div class="mini"><span class="sub">炸板率</span><b class="flat">待接入</b></div></div><div class="ladder">${safe(s.ladder).map(x=>`<div class="col" data-tip="${esc(x.date)} · ${x.height}板" style="height:${Math.max(4,(x.height||0)*13)}px"></div>`).join('')}</div></section>
<section class="card span7"><div class="cardhead"><div><h2>资金结构</h2><p>仅统计当日龙虎榜口径</p></div><span class="badge">机构 / 游资 / ETF</span></div><div class="flowrow"><div class="flowcell"><span>机构净买</span><b class="${cls(st.org_net)}">${fmtMoney(st.org_net)}</b></div><div class="flowcell"><span>游资净买</span><b class="${cls(st.hot_money_net)}">${fmtMoney(st.hot_money_net)}</b></div><div class="flowcell"><span>ETF净流入</span><b class="flat">待接入</b></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:12px"><div><div class="kicker">机构净买 Top</div>${table(safe(d.org_top).slice(0,5),'net',true)}</div><div><div class="kicker">游资净买 Top</div>${table(safe(d.hot_money_top).slice(0,5),'net',true)}</div></div></section>

<section class="card span12"><div class="cardhead"><div><h2>龙头股走势</h2><p>热股榜候选；走势从每日快照开始积累</p></div><span class="badge">Top 8</span></div><div class="leaders">${safe(d.leaders).map(r=>`<div class="leader"><div class="name">${esc(r.name)}</div><div class="code">${esc(r.thscode)} · 热度#${r.rank??'—'}</div><div class="quote"><b>${r.last_price||'—'}</b><span class="${cls(r.change_pct)}">${pct(r.change_pct)}</span></div>${spark(r.trend,r.change_pct>=0?'#ff6873':'#26c995')}<div class="tags">${esc(safe(r.tags).map(x=>typeof x==='string'?x:x.name).join(' · '))}</div></div>`).join('')||'<div class="empty">暂无热股数据</div>'}</div></section>

<section class="card span12"><div class="cardhead"><div><h2>主线轮动时间轴</h2><p>每天保留前三行业与概念，积累后识别切换</p></div><span class="badge">最近30日</span></div><div class="timeline">${safe(d.rotation).map((r,i,a)=>`<div class="day ${i===a.length-1?'current':''}"><time>${esc(r.date)}</time><div class="chips">${safe(r.industries).map(x=>`<span class="chip">${esc(x)}</span>`).join('')}${safe(r.concepts).map(x=>`<span class="chip concept">${esc(x)}</span>`).join('')}</div></div>`).join('')||'<div class="empty">首次刷新后开始记录</div>'}</div></section>

<section class="card span12"><div class="cardhead"><div><h2>下一交易日观察清单</h2><p>由板块强度、热度与机构行为生成，仅用于跟踪验证</p></div><span class="badge warn">非荐股</span></div><div class="focus"><div class="focusbox"><strong>行业方向</strong><ol>${safe(d.focus.industries).map(x=>`<li>${esc(x)}</li>`).join('')||'<li>暂无</li>'}</ol></div><div class="focusbox"><strong>概念方向</strong><ol>${safe(d.focus.concepts).map(x=>`<li>${esc(x)}</li>`).join('')||'<li>暂无</li>'}</ol></div><div class="focusbox"><strong>机构净买个股</strong><ol>${safe(d.focus.stocks).map(x=>`<li>${esc(x)}</li>`).join('')||'<li>暂无</li>'}</ol></div></div><div class="sub" style="margin-top:10px">${esc(d.focus.note)}</div><div class="errors" id="errors">${safe(d.meta.errors).map(esc).join('<br>')}</div></section>`;
renderFlowPanel(d.fund_flow);
}
if(!window.DASHBOARD_DATA){async function tryFetch(u){try{return await fetch(u,{cache:'no-store'}).then(r=>r.json())}catch(e){return null}}async function load(){let d=await tryFetch('/api/data')||await tryFetch('./data/dashboard-data.json');if(!d||d.empty){$('#status').textContent='无法加载数据';$('#app').innerHTML='<div class="card span12 empty"><h2>无法加载数据</h2><p>请通过 HTTP 服务器访问此页面，或双击 <b>serve.cmd</b> 启动服务器后访问 <b>http://127.0.0.1:8765</b></p></div>';return}let live=await tryFetch('/api/live/fund-flow')||await tryFetch('/api/fund-flow');if(live&&live.live!==false){d.fund_flow=live;$('#status').textContent='含实时资金流向'}render(d)}async function poll(){try{let s=await fetch('/api/status',{cache:'no-store'}).then(r=>r.json());$('#status').textContent=s.message;$('#refresh').disabled=s.refreshing;if(s.refreshing)setTimeout(poll,1800);else load()}catch(e){load()}}$('#refresh').onclick=async()=>{try{await fetch('/api/refresh',{method:'POST'});poll()}catch(e){load()}};load()}else{render(DASHBOARD_DATA)}
</script></body></html>
